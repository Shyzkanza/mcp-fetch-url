name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shyzkanza/mcp-scrapidou

jobs:
  # Job 1: Tests
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --ignore-scripts
    - run: npx tsc --noEmit
    - run: npm run build

  # Job 2: Build & push Docker image
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version from tag
      id: version
      run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

  # Job 4: Deploy to VPS
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-image
    steps:
    - uses: actions/checkout@v4

    - name: Copy compose file to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/opt/scrapidou/"
        overwrite: true

    - name: Deploy stack
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          docker pull ghcr.io/shyzkanza/mcp-scrapidou:latest
          docker stack deploy -c /opt/scrapidou/docker-compose.yml scrapidou
          sleep 15
          docker service ls --filter name=scrapidou

  # Job 5: Health Check
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
    - name: Test API Health
      run: |
        for i in {1..5}; do
          echo "Attempt $i/5..."
          if curl -f -s https://scrapidou.rankorr.red/health; then
            echo ""
            echo "API is up!"
            exit 0
          fi
          sleep 10
        done
        echo "API not reachable after 5 attempts"
        exit 1

  # Job 5: Publish npm (après validation du deploy Docker)
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: health-check
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
    - run: npm ci --ignore-scripts
    - run: npm run build
    - run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

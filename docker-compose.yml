services:
  mcp-scrapidou:
    image: ghcr.io/shyzkanza/mcp-scrapidou:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.mcp-scrapidou.rule=Host(`scrapidou.rankorr.red`)"
        - "traefik.http.routers.mcp-scrapidou.entrypoints=websecure"
        - "traefik.http.routers.mcp-scrapidou.tls.certresolver=letsencrypt"
        - "traefik.http.services.mcp-scrapidou.loadbalancer.server.port=3000"
        - "traefik.http.routers.mcp-scrapidou.middlewares=mcp-scrapidou-cors"
        - "traefik.http.middlewares.mcp-scrapidou-cors.headers.accesscontrolalloworiginlist=https://chatgpt.com,https://chat.openai.com"
        - "traefik.http.middlewares.mcp-scrapidou-cors.headers.accesscontrolallowmethods=GET,POST,DELETE,OPTIONS"
        - "traefik.http.middlewares.mcp-scrapidou-cors.headers.accesscontrolallowheaders=Content-Type,Authorization"
        - "traefik.http.middlewares.mcp-scrapidou-cors.headers.accesscontrolmaxage=86400"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      agents-net:
        aliases: [mcp-scrapidou]

networks:
  agents-net:
    external: true
    name: agents-net-swarm
